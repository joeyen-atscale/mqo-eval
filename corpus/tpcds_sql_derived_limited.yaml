context: |
  All questions concern the TPC-DS benchmark dataset. Use the query_multidimensional
  MCP tool with the model tpcds_benchmark_model to answer questions.
  The server also hosts unrelated models (e.g. AdventureWorks: ASAdventureSmall,
  ResellerPerspective) — do not query those; their data will produce wrong answers.

  WORKFLOW — for each question:
  1. Call search_columns with relevant keywords to find the right dimension hierarchy
     and level unique_names (e.g. "store city" to find store_dimension.[Store City]).
  2. Call query_multidimensional with the MQO wrapped as {"mqo": { ... }}. The schema is:
     {"mqo": { "model": "<model_coordinate>", "measures": [...], "dimensions": [...],
               "filters": [...], "projection": <bool>, "non_empty": false, "time_intelligence": [] }}
     The "mqo" wrapper key is REQUIRED — do not pass fields at the top level.
  3. Every filter MUST have a "type" field. Use:
     - {"type": "member_level", "hierarchy": "h_name", "level": "h_name.[Level Name]",
        "members": ["value"]}  — for equality filters (preferred; avoids domain scan)
     - {"type": "range", "level": "...", "lo": X, "hi": Y}  — for numeric/date ranges
  4. For list/distinct questions (which/each/list): set projection=true and measures=[].
     For aggregation questions (count/sum/avg): set projection=false and add measure refs.
  5. In your answer JSON, use the EXACT column names and values returned by the MQO tool.
     Do NOT rename, shorten, or paraphrase dimension level labels.
     Do NOT reformat numeric values — copy them as JSON numbers (e.g. 621234, not "621,234").
  The MQO system groups by dimensions automatically — no GROUP BY needed.
  Null dimension values are excluded automatically — no NULL filter needed.
  Use existing model measures (from search_columns) instead of computing aggregations.

# Full mirror of tpcds_sql_derived.yaml (same case ids), with an explicit limit
# added only to the large-result cases — a "top N" in the question and a matching
# ORDER BY ... LIMIT 20 in the reference. Probes whether bounding the result helps
# the agent (vs. declining/truncating a large answer). Cases that already return
# <=20 rows (scalars, tightly-filtered, small-dimension aggregations) are copied
# verbatim. For the limited cases the question spells out the *full* sort (the
# ranking key plus tie-breakers) so the top-N membership is deterministic and the
# agent can reproduce the reference's exact 20; comparison stays unordered (the
# set of the top 20 is what's scored).

queries:
  - id: express-shipping-carriers
    nl_query: "What shipping carriers are available for shipping type 'EXPRESS'?"
    expected_sql: |
      SELECT "Carrier"
      FROM ${CatalogName}.${ModelName}
      WHERE "Ship Mode Type" = 'EXPRESS';
    disabled: false

  - id: midway-stores
    nl_query: "What is the name, manager and floor space of each store in the city of Midway?"
    expected_sql: |
      SELECT "Store Name", "Store Manager", "Store Floor Space"
      FROM ${CatalogName}.${ModelName}
      WHERE "Store City" = 'Midway';
    disabled: false
    equivalent_attributes:
      - ["Store Manager", "Manager", "store_manager", "StoreManager"]
        # why: agent omits "Store" prefix when NL query says "manager"
      - ["Store Floor Space", "Floor Space", "store_floor_space", "FloorSpace"]
        # why: agent omits "Store" prefix when NL query says "floor space"

  - id: fairview-warehouses
    nl_query: "What is the name and square footage for each warehouse in the city of Fairview?"
    expected_sql: |
      SELECT "Warehouse Name", "Warehouse Square Feet"
      FROM ${CatalogName}.${ModelName}
      WHERE "Warehouse City" = 'Fairview';
    disabled: false
    pass_threshold: 0.75
    equivalent_attributes:
      - ["Warehouse Square Feet", "Square Footage", "square footage", "Sq Ft",
         "SquareFootage", "Warehouse Sq Ft"]
        # why: agent uses natural shorthand for the display label "Warehouse Square Feet"
      # NOTE: gold reference contains a null-row (NULL warehouse name) that CE SQL
      # backend suppresses — row_recall may be 0.8 even with correct data.

  - id: large-warehouses
    nl_query: "What is the name of each warehouse with more than 140000 square feet of space?"
    expected_sql: |
      SELECT "Warehouse Name"
      FROM ${CatalogName}.${ModelName}
      WHERE "Warehouse Square Feet" > 140000;
    disabled: false

  - id: catalog-customer-count
    nl_query: "What is the count of catalog customers?"
    expected_sql: |
      SELECT "Catalog Customer Count"
      FROM ${CatalogName}.${ModelName};
    disabled: false

  - id: total-quantity-sold-per-year
    nl_query: "What is the total quantity sold each year?"
    expected_sql: |
      SELECT "Sold Calendar Year", "Total Quantity Sold"
      FROM ${CatalogName}.${ModelName};
    disabled: false

  - id: product-count-per-category
    nl_query: "What is the count of products in each product category?"
    expected_sql: |
      SELECT "Product category", "Total Product Count"
      FROM ${CatalogName}.${ModelName};
    disabled: false

  # LIMITED: ~41 store numbers -> the 20 lowest (single, unique sort key).
  - id: unique-stores-tennessee
    nl_query: "What are the unique store numbers in the state of Tennessee? Give the 20 lowest, ordered by store number ascending."
    expected_sql: |
      SELECT "Store Number"
      FROM ${CatalogName}.${ModelName}
      WHERE "Store State Name" = 'Tennessee'
      ORDER BY "Store Number" ASC
      LIMIT 20;
    disabled: false

  - id: corpcorp-brand-products
    nl_query: "What is the name of each product of brand name 'corpcorp #1'?"
    expected_sql: |
      SELECT "Item Product Name"
      FROM ${CatalogName}.${ModelName}
      WHERE "Product Brand Name" = 'corpcorp #1';
    disabled: false

  - id: able-manufacturer-brands
    nl_query: "What brand names are made by the manufacturer named able?"
    expected_sql: |
      SELECT "Product Brand Name"
      FROM ${CatalogName}.${ModelName}
      WHERE "Product Manufacturer Name" = 'able';
    disabled: false

  - id: products-price-above-70
    nl_query: "What is the name of each product with a current price greater than 70?"
    expected_sql: |
      SELECT "Item Product Name"
      FROM ${CatalogName}.${ModelName}
      WHERE "Product Current Price" > 70;
    # Re-enabled 2026-06-21 as the regression target for the measureless
    # attribute-projection-with-value-filter gap (B1 cardinality_unknown / measureless
    # path). Gold minted via mqo-pg-query against CE (639 products). Expected to FAIL
    # until that fix lands; flip back to disabled:true to drop it from the denominator.
    disabled: false
    equivalent_attributes:
      - ["Item Product Name", "Product Name", "Product", "Item Name", "Item Product"]
        # why: agent may project any product-name label; semantic intent is unambiguous

  # LIMITED: one row per store -> top 20 by employee count, ties by store name.
  - id: store-employee-counts
    nl_query: "For each store name, how many employees work there? Give the top 20 ordered by employee count (highest first), breaking ties by store name (A→Z)."
    expected_sql: |
      SELECT "Store Name", "Store Number of Employees"
      FROM ${CatalogName}.${ModelName}
      ORDER BY "Store Number of Employees" DESC, "Store Name" ASC
      LIMIT 20;
    disabled: false
    equivalent_attributes:
      - ["Store Number of Employees", "Number of Employees", "Employee Count",
         "Employees", "Store Employees", "Num Employees"]
        # why: agent omits "Store" prefix; semantic intent is unambiguous

  # LIMITED: per-product returns (was hitting the 200k row cap) -> top 20.
  - id: store-returns-per-product
    nl_query: "What is the number of store returns for each product? Give the top 20 ordered by store returns (highest first), breaking ties by product name (A→Z)."
    expected_sql: |
      SELECT "Item Product Name", "Store Returns Count"
      FROM ${CatalogName}.${ModelName}
      ORDER BY "Store Returns Count" DESC, "Item Product Name" ASC
      LIMIT 20;
    disabled: false

  # LIMITED: per-store average -> top 20.
  - id: avg-sales-quantity-per-store
    nl_query: "What is the average sales quantity per store number? Give the top 20 ordered by average sales quantity (highest first), breaking ties by store number (lowest first)."
    expected_sql: |
      SELECT "Store Number", "Average Store Sales Quantity"
      FROM ${CatalogName}.${ModelName}
      ORDER BY "Average Store Sales Quantity" DESC, "Store Number" ASC
      LIMIT 20;
    disabled: false
    # Agent (query_multidimensional live DAX) may label the measure with a shorter
    # display name or underscore form vs the gold's canonical "Average Store Sales Quantity".
    equivalent_attributes:
      - ["Average Store Sales Quantity", "Avg Store Sales Qty", "Average Sales Quantity",
         "avg_store_sales_quantity", "avg store sales quantity", "Average Store Sales Quantity_SUM"]
        # why: DAX measure alias in live result may decode differently from PGWire column alias

  # LIMITED: per-product net profit (was hitting the 200k row cap) -> top 20.
  - id: total-net-profit-per-product
    nl_query: "What is the total net profit per product name? Give the top 20 ordered by net profit (highest first), breaking ties by product name (A→Z)."
    expected_sql: |
      SELECT "Item Product Name", "Total Net Profit"
      FROM ${CatalogName}.${ModelName}
      ORDER BY "Total Net Profit" DESC, "Item Product Name" ASC
      LIMIT 20;
    disabled: false
    # Agent may use shorter aliases for measure and dimension columns.
    equivalent_attributes:
      - ["Total Net Profit", "Net Profit", "total_net_profit", "total net profit amount",
         "Store Net Profit", "Catalog Net Profit Amount"]
        # why: agent may pick a different store/catalog-specific net profit measure
      - ["Item Product Name", "Product Name", "item_product_name", "Item Name",
         "Item Product Name1"]
        # why: near-twin disambiguation may suffix the canonical level name

  # LIMITED: per-brand quantity -> top 20.
  - id: store-quantity-sold-per-brand
    nl_query: "For each brand name, what was the quantity sold in store? Give the top 20 ordered by store quantity sold (highest first), breaking ties by brand name (A→Z)."
    expected_sql: |
      SELECT "Product Brand Name", "Store Quantity Sold"
      FROM ${CatalogName}.${ModelName}
      ORDER BY "Store Quantity Sold" DESC, "Product Brand Name" ASC
      LIMIT 20;
    disabled: false

  # LIMITED: per-state web sales (~50 states) -> top 20.
  - id: web-sales-per-customer-state
    nl_query: "What is the total web sales for each customer home state? Give the top 20 ordered by web sales (highest first), breaking ties by state name (A→Z)."
    expected_sql: |
      SELECT "Customer State Name", "Web Sales"
      FROM ${CatalogName}.${ModelName}
      ORDER BY "Web Sales" DESC, "Customer State Name" ASC
      LIMIT 20;
    disabled: false

  # LIMITED: customers in income band 9 (was hitting the 200k row cap) -> top 20.
  - id: customer-vehicle-count-income-band-9
    nl_query: "What is the customer id and vehicle count for every customer in income band 9? Give the top 20 ordered by vehicle count (highest first), breaking ties by customer id (ascending)."
    expected_sql: |
      SELECT "Customer ID", "Vehicle Count"
      FROM ${CatalogName}.${ModelName}
      WHERE "Income Band" = 9
      ORDER BY "Vehicle Count" DESC, "Customer ID" ASC
      LIMIT 20;
    # DISABLED 2026-06-21 — CE/infra limit, not live-reproducible on the eval target.
    # The gold's OWN reference SQL (above, `= 9`) times out at >90s on local CE docker, well
    # past the 60s engine deadline, so this case can never pass the local eval regardless of
    # any mqo change. BUG 2 (high-cardinality cross-dim measureless DISTINCT on Customer ID's
    # grain, no TOP-N pushdown) is the blocker; auto-anchor rejected (changes semantics + bends
    # the measureless invariant). Separately surfaced BUG 1 (numeric member filter quoted as
    # `IN ('9')` → fast CE "db error"; fix = type-aware quoting in the router) — but BUG 1's
    # fix won't flip THIS case (BUG 2 still times it out), so a fast single-dim Income-Band
    # witness is needed to measure the BUG 1 fix instead. Re-enable only if validated on
    # mcp-aws or a faster CE. See memory: buildloop-iter2-residuals-measureless.
    disabled: true

  # WITNESS for BUG 1 (numeric member-filter SQL-quoting). Added 2026-06-21 to replace the
  # disabled vc case as the measurable regression target. Scalar measure + single numeric
  # filter — NO measureless/cross-dim/ChannelScope confounds, so it fails ONLY on BUG 1.
  # Verified 2026-06-21: the router emits `WHERE "Income Band" IN ('9')` (quoted) → CE
  # "db error" TODAY; the unquoted `IN (9)` returns 175407 (= the `= 9` oracle gold). So this
  # case is a deterministic FAIL now and FLIPS to PASS once mqo-backend-router::filter_to_sql
  # quotes member literals by level value_type (catalog already tags Income Band integer).
  - id: customer-count-income-band-9
    nl_query: "How many customers are in income band 9?"
    expected_sql: |
      SELECT "Customer Count"
      FROM ${CatalogName}.${ModelName}
      WHERE "Income Band" = 9;
    disabled: false

  - id: net-profit-tier-by-store-gender-2002
    nl_query: "What is the net profit tier for each store name and gender in the 2002 sales year?"
    expected_sql: |
      SELECT "Store Name", "Net Profit Tier", "Gender"
      FROM ${CatalogName}.${ModelName}
      WHERE "Sold Calendar Year" = 2002;
    disabled: false

  # LIMITED: customers who shopped store 'ese' in 2001 -> first 20 by first name, ties by gender.
  - id: customers-ese-store-2001
    nl_query: "What was the first name and gender of each customer that shopped in the store named 'ese' in 2001? Give the first 20 ordered by first name (A→Z), breaking ties by gender (A→Z)."
    expected_sql: |
      SELECT "Customer First Name", "Gender"
      FROM ${CatalogName}.${ModelName}
      WHERE "Store Name" = 'ese'
      AND "Sold Calendar Year" = 2001
      ORDER BY "Customer First Name" ASC, "Gender" ASC
      LIMIT 20;
    disabled: false
    # Agent may abbreviate "Customer First Name" or use a differently disambiguated
    # column label from clean_result_rows (e.g., when two hierarchies share a level label).
    equivalent_attributes:
      - ["Customer First Name", "First Name", "customer_first_name",
         "customer dimension Customer First Name", "CustomerFirstName"]
        # why: clean_result_rows may add "customer dimension" prefix on label collision
      - ["Gender", "gender", "customer demographics Gender"]
        # why: customer_demographics hierarchy prefix may be prepended on label collision

  # LIMITED: customers in New Jersey -> first 20, full ordering spelled out.
  - id: customer-details-new-jersey
    nl_query: "What is the first name, income band, vehicle count, and buy potential for each customer that lives in the state of New Jersey? Give the first 20 ordered by income band, then vehicle count, then buy potential, then first name (all ascending)."
    expected_sql: |
      SELECT "Customer First Name", "Income Band", "Vehicle Count", "Customer Buy Potential"
      FROM ${CatalogName}.${ModelName}
      WHERE "Customer State Name" = 'New Jersey'
      ORDER BY "Income Band" ASC, "Vehicle Count" ASC, "Customer Buy Potential" ASC, "Customer First Name" ASC
      LIMIT 20;
    # DISABLED 2026-06-21 — CE/infra limit, not live-reproducible on the eval target.
    # The gold's OWN reference SQL (above) times out at the 65s engine deadline on local CE
    # docker — a 4-attribute cross-dim measureless projection (customer × household_demographics
    # × customer_address), same BUG-2 class as customer-vehicle-count (high-cardinality cross-dim,
    # no TOP-N pushdown). Text state filter, so no BUG 1. Also exhibits C (drops the null-first-name
    # gold row) — but C's fix can't flip this case while BUG 2 times it out. The C null-member
    # signal is preserved by product-count-per-category. Re-enable only if validated on mcp-aws
    # or a faster CE. See memory: buildloop-iter2-residuals-measureless.
    disabled: true
