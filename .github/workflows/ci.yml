name: ci

on:
  push:
    branches: [main, "autobuilder/**"]
  pull_request:

permissions:
  contents: read

jobs:
  gate:
    name: autobuilder gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: install rust toolchain (pinned by rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@9d7e65c320fdb52dcd45ffaa68deb6c02c8754d9 # v1.10.1

      - name: install cargo-deny
        uses: taiki-e/install-action@84c20235bedc3797f1cf1146ac240e2c3df9b7df # v2.49.27
        with:
          tool: cargo-deny

      - name: cargo check
        run: cargo check --workspace

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: cargo deny check
        run: cargo deny check

      - name: bad-rust audit
        run: ./scripts/audit.sh
