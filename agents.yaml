agents:
  stub:
    command: "python -m mqo_eval.stub_agent"
    kind: subprocess
    capabilities:
      requires_api: false
      returns_handle: false
  mqo-agent:
    command: "mqo-agent ask --mock"
    kind: subprocess
    capabilities:
      requires_api: false
      returns_handle: false
  oai-agent:
    command: "python -m mqo_eval.agents.oai_agent"
    kind: subprocess
    capabilities:
      requires_api: false   # false when using local model
      returns_handle: true
  replay:
    command: "python -m mqo_eval.agents.replay_agent replay"
    kind: subprocess
    capabilities:
      requires_api: false
      returns_handle: false
